<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>弹幕发送端</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --text: #1b2430;
      --muted: #6b7785;
      --primary: #0077ff;
      --primary-strong: #005dd1;
      --border: #dde4ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at 0% 0%, #dbeafe 0, transparent 45%),
                  radial-gradient(circle at 100% 100%, #e9d5ff 0, transparent 40%),
                  var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(720px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      box-shadow: 0 20px 48px rgba(15, 23, 42, 0.08);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3.2vw, 34px);
    }

    p.tip {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      font-size: 14px;
      color: var(--muted);
      display: grid;
      gap: 7px;
    }

    textarea,
    input,
    button {
      font: inherit;
    }

    textarea {
      resize: vertical;
      min-height: 110px;
      max-height: 280px;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      outline: none;
    }

    textarea:focus,
    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(0, 119, 255, 0.15);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    input[type="color"],
    input[type="number"] {
      border: 1px solid var(--border);
      border-radius: 10px;
      height: 42px;
      padding: 0 10px;
      background: #fff;
    }

    button {
      border: 0;
      background: linear-gradient(135deg, var(--primary), var(--primary-strong));
      color: #fff;
      border-radius: 12px;
      height: 46px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 120ms ease;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0); }

    #status {
      margin-top: 6px;
      font-size: 14px;
      min-height: 22px;
      color: var(--muted);
    }

    @media (max-width: 560px) {
      .row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>弹幕发送端</h1>
    <p class="tip">提交后会实时推送到 <code>/screen</code> 页面。支持自定义颜色和速度。</p>

    <form id="dmForm">
      <label>
        弹幕内容
        <textarea id="text" maxlength="120" placeholder="输入弹幕（最多 120 字）" required></textarea>
      </label>

      <div class="row">
        <label>
          颜色
          <input id="color" type="color" value="#ffffff" />
        </label>

        <label>
          速度（像素/秒）
          <input id="speed" type="number" min="40" max="240" value="90" step="5" />
        </label>
      </div>

      <button type="submit">发送弹幕</button>
      <div id="status"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById("dmForm");
    const textEl = document.getElementById("text");
    const colorEl = document.getElementById("color");
    const speedEl = document.getElementById("speed");
    const statusEl = document.getElementById("status");

    function setStatus(msg, isError = false) {
      statusEl.textContent = msg;
      statusEl.style.color = isError ? "#d11a2a" : "#355070";
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const text = textEl.value.trim();
      if (!text) {
        setStatus("请输入弹幕内容", true);
        return;
      }

      const payload = {
        text,
        color: colorEl.value,
        speed: Number(speedEl.value),
      };

      try {
        setStatus("发送中...");
        const res = await fetch("/api/danmaku", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json();

        if (!res.ok || !data.ok) {
          throw new Error(data.message || "发送失败");
        }

        textEl.value = "";
        setStatus("发送成功");
      } catch (err) {
        setStatus(err.message || "发送失败", true);
      }
    });
  </script>
</body>
</html>
